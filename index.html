<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulsoMX | Últimas Noticias de México</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <header class="bg-red-700 text-white shadow-md p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black tracking-tight">⚡ PULSO<span class="text-yellow-400">MX</span></a>
            <a href="privacidad.html" class="text-sm hover:underline">Privacidad</a>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-6xl mt-6">
        <h2 class="text-2xl font-extrabold border-b-4 border-red-700 inline-block mb-6">Titulares de Hoy</h2>
        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <p class="text-slate-500 animate-pulse">Sincronizando con los satélites de noticias...</p>
        </div>
    </main>

    <script>
        fetch("data/noticias.json")
            .then(res => res.json())
            .then(data => {
                const grid = document.getElementById("news-grid");
                grid.innerHTML = "";
                // Mostrar las noticias más recientes primero
                data.reverse().forEach(n => {
                    grid.innerHTML += `
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition">
                            <img src="${n.imagen}" class="w-full h-48 object-cover">
                            <div class="p-4">
                                <span class="text-xs font-bold text-red-600 uppercase">${n.fecha}</span>
                                <h3 class="font-bold text-lg mt-1 line-clamp-2 text-slate-800">${n.titulo}</h3>
                                <p class="text-sm text-slate-600 mt-2 line-clamp-3">${n.resumen}</p>
                                <a href="noticia.html?id=${n.id}" class="bg-red-700 text-white text-center block w-full font-bold py-2 rounded-lg mt-4 hover:bg-red-800 transition text-sm">Leer Noticia Completa</a>
                            </div>
                        </div>`;
                });
            }).catch(() => document.getElementById("news-grid").innerHTML = "Esperando la primera ronda de noticias automáticas...");
    </script>
</body>
</html>
